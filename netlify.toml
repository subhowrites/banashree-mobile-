# netlify.toml - Netlify configuration file for GitHub API version

[build]
  # Build command (no build required for static site)
  command = "echo 'No build required'"
  
  # Functions ka folder
  functions = "netlify/functions"
  
  # Publish directory (root folder)
  publish = "."

[build.environment]
  # Node.js version for functions
  NODE_VERSION = "18"

# ===== DEVELOPMENT SETTINGS =====
[dev]
  # Local development ke liye functions path
  functions = "netlify/functions"
  
  # Local development ke liye publish directory
  publish = "."
  
  # Local development server port
  port = 8888
  
  # Auto-open browser on start
  autoLaunch = true

# ===== REDIRECTS =====
# API calls ko functions par map करो
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Admin panel redirects
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/login"
  to = "/admin/login.html"
  status = 200

# Root redirects
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# ===== HEADERS =====
# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Admin panel cache control (no cache)
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Functions ke liye CORS headers
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age = "86400"

# ===== FUNCTIONS CONFIGURATION =====
# Individual function settings can be specified here if needed
# Example:
# [functions.get-products]
#   timeout = 30
#   memory = 1024

# ===== CACHING =====
# Static assets caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"